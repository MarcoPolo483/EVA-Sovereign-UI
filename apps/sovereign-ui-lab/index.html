<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVA Sovereign UI Lab - Reference Implementation</title>
  <meta name="description" content="Comprehensive reference implementation showcasing EVA-Sovereign-UI component library with real-world scenarios, inspector panel, and developer kit.">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: "Noto Sans", sans-serif;
    }

    body {
      background: var(--eva-color-background, #f5f5f5);
      color: var(--eva-color-text, #333);
    }

    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 1.5rem;
      color: var(--eva-color-primary, #26374a);
    }

    /* Screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Focus styles */
    :focus-visible {
      outline: 3px solid var(--eva-color-focus, #0535d2);
      outline-offset: 2px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* High contrast mode */
    @media (prefers-contrast: high) {
      :root {
        --eva-color-background: #000;
        --eva-color-text: #fff;
        --eva-color-primary: #00ff00;
      }
    }
  </style>
</head>
<body>
  <h1 class="sr-only">EVA Sovereign UI Lab</h1>
  
  <div id="app">
    <div class="loading" role="status" aria-live="polite">
      Loading EVA Sovereign UI Lab...
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
